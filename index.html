<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="top-bar">
    <div class="title">Flashcards</div>
    <div class="top-buttons">
      <button id="decksButton">Decks</button>
      <button>Boton 2</button>
      <button>Boton 3</button>
    </div>
  </div>

  <div class="container">
    <div class="memorize-button-container">
      <button id="memorizeButton">Memorize</button>
    </div>
    <div class="card">
      <div id="cardCount"></div>
      <div class="card-content">
        <div class="card-text" id="cardText">
          <span id="selectDeckMessage">Select your Deck to study...</span>
        </div>
        <div class="card-buttons">
          <button onclick="previousCard(); playSound()">Back</button>
          <button onclick="flipCard(); playSound()">Flip</button>
          <button onclick="nextCard(); playSound()">Next</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".txt" style="display: none;">

  <audio id="buttonSound" src="C:\Users\User\Documents\Juan Jose\Flashcards\Flashcards\analog-appliance-button.mp3"></audio>

  <script>
    let cards = [];
    let currentCard = 0;
    let showingFront = true;
    let shuffledCards = [];
    let cardsSeen = 0;
    let studyMode = false;

    const fileInput = document.getElementById('fileInput');
    const decksButton = document.getElementById('decksButton');
    const cardCountDisplay = document.getElementById('cardCount');
    const memorizeButton = document.getElementById('memorizeButton');
    const cardText = document.getElementById('cardText');
    const cardLabel = document.getElementById('cardLabel');
    const backButton = document.querySelector('.card-buttons button:first-child');
    const flipButton = document.querySelector('.card-buttons button:nth-child(2)');
    const nextButton = document.querySelector('.card-buttons button:last-child');
    const selectDeckMessage = document.getElementById('selectDeckMessage');

    decksButton.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      const reader = new FileReader();

      reader.onload = (e) => {
        const text = e.target.result;
        const lines = text.split('\n');
        lines.forEach(line => {
          const [front, back] = line.split('|');
          if (front && back) {
            cards.push({ front: front.trim(), back: back.trim() });
          }
        });

        shuffledCards = shuffle(cards);
        cardsSeen = 1;
        showCard();
        updateCardCount();

        // Ocultar el mensaje después de cargar un deck
        selectDeckMessage.style.display = 'none';
      }

      reader.readAsText(file);
    });

    memorizeButton.addEventListener('click', () => {
      studyMode = !studyMode;
      if (studyMode) {
        // Mostrar una tarjeta en modo "Memorize"
        currentCard = 0;
        // No reiniciar cardsSeen en modo "Study"
        showCard();
        updateCardCount();

        // Habilitar "Back" y "Next", deshabilitar "Flip"
        backButton.disabled = false;
        nextButton.disabled = false;
        flipButton.disabled = true;

        // Cambiar el estilo del botón "Memorize"
        memorizeButton.style.backgroundColor = '#e3fbb4';
        memorizeButton.style.color = '#b8ff2b';
      } else {
        // Volver al modo individual
        cardsSeen = 1;
        showingFront = true;
        showCard();
        updateCardCount();

        // Deshabilitar "Back" y "Next" si no hay tarjetas
        backButton.disabled = shuffledCards.length === 0 || cardsSeen === 1;
        nextButton.disabled = shuffledCards.length === 0 || cardsSeen === shuffledCards.length;
        flipButton.disabled = false; // Habilitar "Flip"

        // Restaurar el estilo del botón "Memorize"
        memorizeButton.style.backgroundColor = 'initial'; // Restaura al color por defecto
        memorizeButton.style.color = 'initial'; // Restaura al color por defecto
      }
    });

    function showCard() {
      if (studyMode) {
        // Mostrar una tarjeta en modo "Memorize"
        if (shuffledCards.length > 0 && cardsSeen <= shuffledCards.length) {
          const card = shuffledCards[cardsSeen - 1];
          cardText.innerHTML = `<div class="question">${card.front}</div><div class="answer">${card.back}</div>`;
          cardLabel.textContent = "";
        } else {
          cardText.textContent = " ";
          cardLabel.textContent = "";
        }
      } else {
        // Mostrar la tarjeta individual
        if (shuffledCards.length > 0 && cardsSeen <= shuffledCards.length) {
          const card = shuffledCards[cardsSeen - 1];
          cardText.textContent = showingFront ? card.front : card.back;
          cardLabel.textContent = showingFront ? "Question" : "Answer";
        } else {
          cardText.textContent = " ";
          cardLabel.textContent = "";
        }
      }
    }

    function flipCard() {
      if (!studyMode) {
        // Voltear solo en modo individual
        showingFront = !showingFront;
        showCard();
      }
    }

    function nextCard() {
      if (studyMode) {
        // Avanzar a la siguiente tarjeta en modo "Memorize"
        cardsSeen = Math.min(cardsSeen + 1, shuffledCards.length);
        showCard();
        updateCardCount();

        // Deshabilitar "Next" si es la última tarjeta
        nextButton.disabled = cardsSeen === shuffledCards.length;
      } else {
        // Avanzar a la siguiente tarjeta solo en modo individual
        cardsSeen = Math.min(cardsSeen + 1, shuffledCards.length);
        showingFront = true;
        showCard();
        updateCardCount();

        // Deshabilitar "Next" si es la última tarjeta
        nextButton.disabled = cardsSeen === shuffledCards.length;

        // Habilitar "Back"
        backButton.disabled = false;
      }
    }

    function previousCard() {
      if (studyMode) {
        // Volver a la tarjeta anterior en modo "Memorize"
        cardsSeen = Math.max(cardsSeen - 1, 1);
        showCard();
        updateCardCount();

        // Deshabilitar "Back" si es la primera tarjeta
        backButton.disabled = cardsSeen === 1;
      } else {
        // Volver a la tarjeta anterior solo en modo individual
        cardsSeen = Math.max(cardsSeen - 1, 1);
        showingFront = true;
        showCard();
        updateCardCount();

        // Deshabilitar "Back" si es la primera tarjeta
        backButton.disabled = cardsSeen === 1;

        // Habilitar "Next"
        nextButton.disabled = false;
      }
    }

    function shuffle(array) {
      let currentIndex = array.length, randomIndex;
      while (currentIndex != 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [
          array[randomIndex], array[currentIndex]
        ];
      }
      return array;
    }

    function updateCardCount() {
      cardCountDisplay.textContent = "Card Count: " + cardsSeen + "/" + shuffledCards.length;
    }

    function playSound() {
      const buttonSound = document.getElementById('buttonSound');
      buttonSound.currentTime = 0;
      buttonSound.volume = 0.6;
      buttonSound.play();
    }
  </script>
</body>

</html>
